<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L10 Agenda Timer</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --text: #e7e9ee;
      --muted: #9aa3b2;
      --accent: #4da3ff;
      --ok: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; min-height: 100vh; align-items: center; justify-content: center;
    }
    .wrap {
      width: min(1100px, 96vw);
      padding: 24px;
    }
    .top {
      display: grid; gap: 16px; grid-template-columns: 1.4fr 1fr;
    }
    .card { background: var(--panel); border-radius: 16px; padding: 20px; }
    .title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .muted { color: var(--muted); }
    .progress {
      height: 14px; background: #0b0d12; border-radius: 999px; overflow: hidden; margin: 10px 0 6px;
    }
    .bar { height: 100%; width: 0%; background: var(--accent); transition: width .2s linear; }
    .status {
      font-weight: 700; display: inline-block; padding: 4px 10px; border-radius: 999px; margin-right: 8px;
    }
    .status.ok { background: rgba(34,197,94,.2); color: var(--ok); }
    .status.warn { background: rgba(245,158,11,.2); color: var(--warn); }
    .status.bad { background: rgba(239,68,68,.2); color: var(--bad); }
    .timer {
      font-size: clamp(56px, 8vw, 120px); font-weight: 800; letter-spacing: 1px;
    }
    .timer.overtime { color: var(--bad); }
    .section-name { font-size: 28px; font-weight: 700; margin-top: 6px; }
    .section-meta { color: var(--muted); margin-top: 6px; }
    .controls { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    button {
      border: none; border-radius: 10px; padding: 12px 16px; font-weight: 700; cursor: pointer;
      background: #23283a; color: var(--text);
    }
    button.primary { background: var(--accent); color: #08131f; }
    button.danger { background: var(--bad); color: #fff; }
    .agenda {
      margin-top: 18px; display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .item { padding: 12px; border-radius: 12px; background: #121620; border: 1px solid #1f2432; }
    .item.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(77,163,255,.25) inset; }
    .item h4 { margin: 0 0 6px; font-size: 16px; }
    .item .time { color: var(--muted); }
    .footer { margin-top: 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="card">
        <div class="title">L10 Agenda Timer</div>
        <div class="muted">Standard 90-minute EOS Level 10 agenda</div>
        <div class="progress"><div class="bar" id="overallBar"></div></div>
        <div>
          <span class="status ok" id="statusPill">On track</span>
          <span id="offsetText" class="muted">0:00 on time</span>
        </div>
        <div class="muted" style="margin-top:6px;">Overall time: <span id="overallTime">0:00</span> / 90:00</div>
      </div>
      <div class="card">
        <div class="timer" id="timer">5:00</div>
        <div class="section-name" id="sectionName">Check-In</div>
        <div class="section-meta">Section time: <span id="sectionTime">5:00</span></div>
        <div class="controls">
          <button class="primary" id="startPause">Start</button>
          <button id="next">Next</button>
          <button id="prev">Prev</button>
          <button class="danger" id="reset">Reset</button>
        </div>
      </div>
    </div>

    <div class="agenda" id="agenda"></div>
<div class="footer">Tip: Full-screen the browser for a clean meeting display.</div>
  </div>

<script>
  const agenda = [
    { name: 'Check-In', minutes: 5 },
    { name: 'Scorecard Review', minutes: 5 },
    { name: 'Rock Review', minutes: 5 },
    { name: 'Customer/Employee Headlines', minutes: 5 },
    { name: 'To-Do List Review', minutes: 5 },
    { name: 'IDS – Identify, Discuss, Solve', minutes: 60 },
    { name: 'Conclude', minutes: 5 },
  ];

  const totalSeconds = agenda.reduce((s,a)=> s + a.minutes*60, 0);

  let idx = 0;
  let running = false;
  let secLeft = agenda[0].minutes*60;
  let overtime = 0;
  let overallElapsed = 0;
  let lastTick = null;

  const timerEl = document.getElementById('timer');
  const sectionNameEl = document.getElementById('sectionName');
  const sectionTimeEl = document.getElementById('sectionTime');
  const statusPill = document.getElementById('statusPill');
  const offsetText = document.getElementById('offsetText');
  const overallTimeEl = document.getElementById('overallTime');
  const overallBar = document.getElementById('overallBar');
  const agendaEl = document.getElementById('agenda');

  function fmt(sec){
    const s = Math.abs(Math.floor(sec));
    const m = Math.floor(s/60);
    const r = s%60;
    return `${m}:${r.toString().padStart(2,'0')}`;
  }

  function buildAgenda(){
    agendaEl.innerHTML = '';
    agenda.forEach((a,i)=>{
      const div = document.createElement('div');
      div.className = 'item' + (i===idx ? ' active':'');
      div.innerHTML = `<h4>${i+1}. ${a.name}</h4><div class="time">${a.minutes}:00</div>`;
      agendaEl.appendChild(div);
    });
  }

  function updateUI(){
    const section = agenda[idx];
    sectionNameEl.textContent = section.name;
    sectionTimeEl.textContent = `${section.minutes}:00`;

    if (secLeft > 0) {
      timerEl.textContent = fmt(secLeft);
      timerEl.classList.remove('overtime');
    } else {
      timerEl.textContent = `+${fmt(overtime)}`;
      timerEl.classList.add('overtime');
    }

    overallElapsed = Math.max(0, overallElapsed);
    overallTimeEl.textContent = fmt(overallElapsed);
    overallBar.style.width = `${Math.min(100, (overallElapsed/totalSeconds)*100)}%`;

    const plannedElapsed = agenda.slice(0, idx).reduce((s,a)=>s+a.minutes*60,0) + (section.minutes*60 - Math.max(secLeft,0));
    const offset = overallElapsed - plannedElapsed;

    if (offset <= 30) {
      statusPill.textContent = 'On track';
      statusPill.className = 'status ok';
    } else if (offset <= 120) {
      statusPill.textContent = 'Slightly behind';
      statusPill.className = 'status warn';
    } else {
      statusPill.textContent = 'Behind';
      statusPill.className = 'status bad';
    }

    if (offset === 0) offsetText.textContent = '0:00 on time';
    else if (offset > 0) offsetText.textContent = `+${fmt(offset)} behind`; 
    else offsetText.textContent = `−${fmt(offset)} ahead`;

    buildAgenda();
  }

  function tick(ts){
    if (!running) return;
    if (!lastTick) lastTick = ts;
    const delta = Math.floor((ts - lastTick)/1000);
    if (delta >= 1) {
      lastTick += delta*1000;
      overallElapsed += delta;
      if (secLeft > 0) {
        secLeft -= delta;
        if (secLeft < 0) {
          overtime = -secLeft;
          secLeft = 0;
        }
      } else {
        overtime += delta;
      }
      updateUI();
    }
    requestAnimationFrame(tick);
  }

  function startPause(){
    running = !running;
    document.getElementById('startPause').textContent = running ? 'Pause' : 'Start';
    if (running) requestAnimationFrame(tick);
  }

  function next(){
    if (idx < agenda.length-1) {
      idx++;
      secLeft = agenda[idx].minutes*60;
      overtime = 0;
      updateUI();
    }
  }

  function prev(){
    if (idx > 0) {
      idx--;
      secLeft = agenda[idx].minutes*60;
      overtime = 0;
      updateUI();
    }
  }

  function reset(){
    running = false;
    idx = 0;
    secLeft = agenda[0].minutes*60;
overtime = 0;
    overallElapsed = 0;
    lastTick = null;
    document.getElementById('startPause').textContent = 'Start';
    updateUI();
  }

  document.getElementById('startPause').addEventListener('click', startPause);
  document.getElementById('next').addEventListener('click', next);
  document.getElementById('prev').addEventListener('click', prev);
  document.getElementById('reset').addEventListener('click', reset);

  updateUI();
</script>
</body>
</html>
